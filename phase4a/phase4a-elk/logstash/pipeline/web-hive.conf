# web-hive.conf — filter and output for Flask web hive logs
# log_source: web_honeypot
# Source field: remote_ip
# Output index: hive-web-YYYY.MM.dd

filter {
  if [log_source] == "web_honeypot" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
      tag_on_failure => ["_dateparsefailure_web"]
    }

    geoip {
      source => "remote_ip"
      target => "geoip"
    }

    mutate {
      add_field => { "honeypot_surface" => "web" }
    }
  }
}

output {
  if [log_source] == "web_honeypot" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "hive-web-%{+YYYY.MM.dd}"
    }
  }
}
