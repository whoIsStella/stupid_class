# hive-input.conf — Logstash pipeline for hive log ingestion
# Runs on the local machine. Receives from Filebeat over WireGuard, routes to Elasticsearch.
#
# WireGuard addresses:
#   VPS (source):                   10.0.0.1
#   Analysis machine (this machine): 10.0.0.2
#
# Prerequisites:
#   - Elasticsearch running on localhost:9200
#   - Port 5044 open on the WireGuard interface (wg0), not on eth0
#
# Deploy: copy to /etc/logstash/conf.d/hive-input.conf
#         then: systemctl restart logstash

input {
  beats {
    # Bind to WireGuard interface only — not exposed on eth0
    host => "10.0.0.2"
    port => 5044
  }
}

filter {

  # Route to the correct Elasticsearch index based on log_source field
  if [log_source] == "web_honeypot" {
    mutate { add_field => { "[@metadata][index]" => "hive-web" } }
  } else if [log_source] == "cowrie" {
    mutate { add_field => { "[@metadata][index]" => "hive-cowrie" } }
  } else if [log_source] == "suricata" {
    mutate { add_field => { "[@metadata][index]" => "hive-suricata" } }
  } else {
    mutate { add_field => { "[@metadata][index]" => "hive-unknown" } }
  }

  # Parse the timestamp field from the log event as the canonical @timestamp.
  # Falls back to ingest time if the field is missing or unparseable.
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    tag_on_failure => ["_dateparsefailure"]
  }

}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    # Index pattern: hive-web-2025.04.01, hive-cowrie-2025.04.01, etc.
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
  }
}
