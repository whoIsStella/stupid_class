# Filebeat systemd drop-in override
# Ensures Filebeat starts only after WireGuard tunnel is up.
#
# Deploy:
#   mkdir -p /etc/systemd/system/filebeat.service.d/
#   cp filebeat-override.conf /etc/systemd/system/filebeat.service.d/override.conf
#   systemctl daemon-reload
#   systemctl restart filebeat

[Unit]
# Wait for WireGuard before attempting to connect to Logstash
After=wg-quick@wg0.service
Wants=wg-quick@wg0.service

[Service]
Restart=on-failure
RestartSec=10
