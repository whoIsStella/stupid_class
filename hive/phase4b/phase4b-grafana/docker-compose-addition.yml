# docker-compose-addition.yml — merge this Grafana service into phase4a's docker-compose.yml
#
# How to add:
#   1. Copy the 'grafana' service block into phase4a-elk/docker-compose.yml
#   2. Add 'grafanadb' to the volumes section at the bottom
#   3. docker compose up -d
#
# Grafana will be available at http://localhost:3000
# Login: admin / honeypot2025  (change for production)

services:
  grafana:
    image: grafana/grafana-oss:10.4.2
    volumes:
      - ./phase4b-grafana/provisioning:/etc/grafana/provisioning
      - grafanadb:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"             # localhost only — use SSH tunnel for remote access
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-honeypot2025}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  grafanadb:
