version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false      # disable auth for local dev
      - ES_JAVA_OPTS=-Xms1g -Xmx1g       # cap RAM — tune to your machine
    volumes:
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - esdata:/usr/share/elasticsearch/data
    network_mode: host                    # rootless Podman: host networking required for
                                          # port binding to be reachable from the host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    volumes:
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    network_mode: host                    # exposes :5044 on host — Filebeat can reach it
                                          # over WireGuard at 10.77.0.2:5044
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    network_mode: host                    # exposes :5601 on host
    depends_on:
      elasticsearch:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:10.4.2
    volumes:
      - ../../phase4b/phase4b-grafana/provisioning:/etc/grafana/provisioning
      - grafanadb:/var/lib/grafana
    network_mode: host                    # exposes :3000 on host
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-honeypot2025}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  esdata:
  grafanadb:
