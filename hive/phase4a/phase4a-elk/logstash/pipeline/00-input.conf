# 00-input.conf — shared Beats input for all hive log sources
# Logstash merges all .conf files in this directory into one pipeline,
# so the beats port is defined here once and shared by all filter/output files.
#
# For production (Filebeat over WireGuard), change host to "10.77.0.2"
# and update docker-compose.yml ports accordingly.

input {
  beats {
    host => "0.0.0.0"
    port => 5044
  }
}
