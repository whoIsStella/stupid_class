# cowrie.conf — filter and output for Cowrie SSH/Telnet hive logs
# log_source: cowrie
# Source field: src_ip
# Output index: hive-cowrie-YYYY.MM.dd

filter {
  if [log_source] == "cowrie" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
      tag_on_failure => ["_dateparsefailure_cowrie"]
    }

    geoip {
      source => "src_ip"
      target => "geoip"
    }

    # Cowrie uses "eventid" — normalize to cowrie_event_type for dashboard queries
    mutate {
      rename => { "eventid" => "cowrie_event_type" }
      add_field => { "honeypot_surface" => "ssh" }
    }
  }
}

output {
  if [log_source] == "cowrie" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "hive-cowrie-%{+YYYY.MM.dd}"
    }
  }
}
