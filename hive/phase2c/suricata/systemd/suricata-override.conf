# Suricata systemd drop-in override
# Waits for network interface to be fully up before starting,
# and sets resource limits appropriate for a traffic-monitoring daemon.
#
# Deploy:
#   mkdir -p /etc/systemd/system/suricata.service.d/
#   cp suricata-override.conf /etc/systemd/system/suricata.service.d/override.conf
#   systemctl daemon-reload
#   systemctl restart suricata

[Unit]
# network-online.target ensures eth0 is fully configured before AF_PACKET starts
After=network-online.target
Wants=network-online.target

[Service]
# Suricata opens a file descriptor per flow under load
LimitNOFILE=65536
# Restart on any failure, wait 10s to avoid tight restart loops
Restart=on-failure
RestartSec=10
