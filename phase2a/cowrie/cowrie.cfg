# cowrie.cfg — Hive SSH/Telnet hive config
# Overrides cowrie.cfg.dist. Only settings that differ from defaults are listed here.
# Copy to /opt/cowrie/etc/cowrie.cfg after install.
#
# Ports:
#   SSH:    2222 inside VM — host iptables NATs eth0:22  → tap0:2222
#   Telnet: 2323 inside VM — host iptables NATs eth0:23  → tap0:2323
#
# Log paths use /var/log/hive/ — consistent with all other hive components.

[honeypot]
hostname = DrayTek-Router
log_path = /var/log/hive
download_path = /var/log/hive/dl
contents_path = honeyfs
txtcmds_path = txtcmds
ttylog = true
ttylog_path = /var/log/hive/tty
interactive_timeout = 120

[output_jsonlog]
enabled = true
logfile = /var/log/hive/cowrie.json

[output_textlog]
enabled = true
logfile = /var/log/hive/cowrie.log

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
# Impersonate an old OpenSSH on Debian — believable for an unpatched router
version = SSH-2.0-OpenSSH_7.4p1 Debian-10+deb9u7

[telnet]
enabled = true
listen_endpoints = tcp:2323:interface=0.0.0.0
